*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f0f1a;color:#f0eeee;min-height:100vh;-webkit-text-size-adjust:100%;}
:root{--a:#f7c948;--a2:#e8854a;--g:#0f0f1a;--s:#1a1a2e;--s2:#16213e;--c:#1e1e35;--gr:#4ade80;--rd:#f87171;--bl:#60a5fa;--pu:#a78bfa;--go:#ffd700;--t2:#a0a0c0;--br:rgba(247,201,72,0.15);}

.bee{font-size:1.8rem;display:inline-block;}

.hdr p{font-size:.8rem;color:var(--t2);}
.nav{display:flex;justify-content:center;gap:.4rem;padding:.7rem .5rem;flex-wrap:wrap;border-bottom:1px solid var(--br);background:#0f0f1a;position:sticky;top:0;z-index:100;}
.nb{background:var(--s);border:1px solid var(--br);color:var(--t2);padding:.45rem .85rem;border-radius:999px;cursor:pointer;font-size:.75rem;font-family:inherit;min-height:38px;min-width:70px;}
.nb.on{background:var(--a);color:#0f0f1a;font-weight:700;border-color:var(--a);}
.sc{display:none;padding:.8rem;max-width:840px;margin:0 auto;}
.sc.on{display:block;}
.row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem;}
select{background:var(--s);border:1px solid var(--br);color:#f0eeee;padding:.45rem .7rem;border-radius:8px;font-family:inherit;font-size:.8rem;min-height:40px;-webkit-appearance:none;appearance:none;cursor:pointer;}
.btn{background:var(--a);color:#0f0f1a;border:none;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-weight:700;font-family:inherit;font-size:.82rem;min-height:40px;display:inline-block;-webkit-appearance:none;}

.card{width:100%;max-width:480px;min-height:210px;position:relative;cursor:pointer;border-radius:14px;}
.face{position:absolute;inset:0;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.4rem;border:1px solid var(--br);transition:opacity .2s;}

.card.flip .front{opacity:0;pointer-events:none;}
.card.flip .back{opacity:1;pointer-events:auto;}

.tw{overflow-x:auto;}

்கு பிறகு சாலையில் குழிகள் நிறைந்துள்ளன.", "குழிகள் (potholes) + நிறைந்துள்ளன (are full of)"], [19, 0, "street", "There is a big tree at the end of our street.", "நம் தெருவின் இறுதியில் ஒரு பெரிய மரம் உள்ளது.", "தெருவின் (street's) + இறுதியில் (at the end)"], [19, 0, "intersection", "Be careful when crossing an intersection.", "சாலை சந்திப்பை கடக்கும்போது கவனமாக இருங்கள்.", "சாலை சந்திப்பை (intersection+acc) + கடக்கும்போது (when crossing)"], [19, 0, "toll", "They paid a toll at the highway entrance.", "நெடுஞ்சாலை நுழைவில் அவர்கள் சுங்கம் கட்டினர்.", "சுங்கம் (toll) + கட்டினர் (paid)"], [19, 0, "overtake/pass", "It is dangerous to overtake on a curve.", "வளைவில் முந்திச் செல்லுவது ஆபத்தானது.", "முந்திச் செல்லுதல் (overtake/pass) + ஆபத்தானது (dangerous)"], [19, 1, "lane merge", "Slow down when approaching a lane merge.", "பாதை இணைப்பை அணுகும்போது வேகத்தை குறையுங்கள்.", "பாதை இணைப்பை (lane merge+acc) + அணுகும்போது (when approaching)"], [19, 1, "yield", "You must yield to pedestrians at a crosswalk.", "நடப்பவர் கடப்பிடத்தில் பாதசாரிகளுக்கு இசைந்து கொடுக்க வேண்டும்.", "இசைந்து கொடு (yield) + வேண்டும் (must)"], [19, 1, "construction", "Road construction delayed our journey.", "சாலை கட்டுமானம் நம் பயணத்தை தாமதப்படுத்தியது.", "கட்டுமானம் (construction) + தாமதப்படுத்தியது (delayed)"], [19, 1, "entry ramp", "Use the entry ramp to join the highway.", "நெடுஞ்சாலையில் சேர நுழைவு சரிவுப் பாதையை பயன்படுத்துங்கள்.", "நுழைவு சரிவுப் பாதையை (entry ramp+acc) + பயன்படுத்துங்கள் (use)"], [19, 1, "exit ramp", "Take the exit ramp to leave the highway.", "நெடுஞ்சாலையை விட வெளியேறும் சரிவுப் பாதையை எடுங்கள்.", "வெளியேறும் சரிவுப் பாதையை (exit ramp+acc) + எடுங்கள் (take)"], [19, 1, "lane change", "Signal before making a lane change.", "பாதை மாற்றம் செய்வதற்கு முன் சமிக்ஞை கொடுங்கள்.", "பாதை மாற்றம் (lane change) + முன் சமிக்ஞை (signal before)"], [19, 1, "median", "Do not cross the median on the highway.", "நெடுஞ்சாலையில் சாலை இடைநிலையை கடக்காதீர்கள்.", "சாலை இடைநிலையை (median+acc) + கடக்காதீர்கள் (do not cross)"], [19, 1, "curbside", "The car stopped at the curbside.", "கார் சாலை ஓரத்தில் நின்றது.", "சாலை ஓரத்தில் (at the curbside) + நின்றது (stopped)"], [19, 1, "pull-over", "The police asked the driver to pull-over.", "காவலர் வாகன ஓட்டியை சாலை ஓர நிறுத்தம் செய்யுமாறு கேட்டார்.", "சாலை ஓர நிறுத்தம் (pull-over) + செய்யுமாறு (to do)"], [19, 1, "road shoulder", "He stopped his car on the road shoulder.", "அவன் சாலை ஓரப் பகுதியில் காரை நிறுத்தினான்.", "சாலை ஓரப் பகுதியில் (on road shoulder) + நிறுத்தினான் (stopped)"], [19, 1, "reserved parking", "This space is reserved parking for disabled people.", "இந்த இடம் ஊனமுற்றோருக்கு முன்பதிவு செய்யப்பட்ட நிறுத்துமிடம்.", "முன்பதிவு செய்யப்பட்ட நிறுத்துமிடம் (reserved parking) + ஊனமுற்றோருக்கு (for disabled)"], [19, 1, "driveway", "He parked his car in the driveway.", "அவன் ஓட்டுப் பாதையில் காரை நிறுத்தினான்.", "ஓட்டுப் பாதையில் (in the driveway) + நிறுத்தினான் (parked)"], [19, 1, "distracted driving", "Distracted driving causes many accidents.", "கவனச்சிதறலுடன் வாகனம் ஓட்டுதல் பல விபத்துகளை ஏற்படுத்துகிறது.", "கவனச்சிதறலுடன் வாகனம் ஓட்டுதல் (distracted driving) + விபத்துகளை ஏற்படுத்துகிறது (causes accidents)"], [19, 1, "parking garage", "They parked the car in the parking garage.", "அவர்கள் வாகன நிறுத்துமிடத்தில் காரை வைத்தனர்.", "வாகன நிறுத்துமிடத்தில் (in parking garage) + வைத்தனர் (parked)"]]</script>

<div class="hdr">
  <div class="bee">🐝</div>
  <h1>TBTA Tamil Theni Practice</h1>
  <p>தேசிய தமிழ்த் தேனீ போட்டி 2026</p>
</div>

<nav class="nav">
  <button class="nb on" onclick="show('fc')">⚡ Cards</button>
  <button class="nb" onclick="show('sp')">📝 Sentences</button>
  <button class="nb" onclick="show('wl')">📖 Words</button>
  <button class="nb" onclick="show('st')">📊 Progress</button>
</nav>

<!-- FLASHCARDS -->
<div id="sc-fc" class="sc on">
  <div class="row">
    <select id="fcat"></select>
    <select id="fdif">
      <option value="-1">D1 + D2</option>
      <option value="0">D1 Only</option>
      <option value="1">D2 Only</option>
    </select>
    <select id="fdir">
      <option value="0">English to Tamil</option>
      <option value="1">Tamil to English</option>
      <option value="2">Random</option>
    </select>
    <button class="btn" onclick="startFC(false)">Start</button>
    <span class="stat" id="fstat">-</span>
  </div>
  <div class="fcwrap">
    <div class="pbar"><div class="pfill" id="fpb"></div></div>
    <div class="card" id="card" onclick="flipCard()">
      <div class="face front" id="cf">
        <div class="ctag" id="cftag"></div>
        <div class="cdif" id="cfdif"></div>
        <div class="cen" id="cfen">Tap Start to begin!</div>
        <div class="chnt" id="cfhnt">Tap card to flip</div>
      </div>
      <div class="face back" id="cb">
        <div class="ctag" id="cbtag"></div>
        <div class="cta" id="cbta"></div>
        <div class="csub" id="cbsub"></div>
      </div>
    </div>
    <div class="acts" id="acts" style="display:none">
      <button class="btn sec" onclick="nc(0,1)">Skip</button>
      <button class="btn rdo" onclick="nc(0,0)">Review Again</button>
      <button class="btn grn" onclick="nc(1,0)">Got It!</button>
    </div>
    <div class="sum" id="fsum" style="display:none">
      <h3>Done! 🎉</h3>
      <div class="sg">
        <div><div class="sn" id="sk" style="color:#4ade80">0</div><div class="sl">Known</div></div>
        <div><div class="sn" id="sr" style="color:#f87171">0</div><div class="sl">Review</div></div>
        <div><div class="sn" id="st2">0</div><div class="sl">Total</div></div>
      </div>
      <div class="sbr">
        <button class="btn" onclick="startFC(false)">New Session</button>
        <button class="btn sec" onclick="startFC(true)">Review Missed</button>
      </div>
    </div>
  </div>
</div>

<!-- SENTENCES -->

  <div class="row">

      <option value="-1">D1 + D2</option>

      <option value="1">D2 Only</option>

    <button class="btn dng" onclick="resetP()">Reset Progress</button>
  </div>
</div>

<div class="spc"></div>

<script>
// Load data from inert JSON script tags - bypasses iOS JS parser limits entirely
var CATS = JSON.parse(document.getElementById('jc').textContent);
var W    = JSON.parse(document.getElementById('jw').textContent);
var S    = JSON.parse(document.getElementById('js').textContent);

// Safe storage
var _m = {};
function sg(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return _m[k]||null;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){_m[k]=v;}}
function sd(k){try{localStorage.removeItem(k);}catch(e){delete _m[k];}}

// State
var prog = sg('tp')||{};
var deck=[], idx=0, flipped=false, kn=0, rv=0, missed=[];
var wcat=-1;

// Utils
function e(id){return document.getElementById(id);}
function esc(s){return String(s).split('&').join('&amp;').split('<').join('&lt;').split('>').join('&gt;');}
function shuf(a){var b=a.slice(),i=b.length,j,t;while(i--){j=Math.floor(Math.random()*(i+1));t=b[i];b[i]=b[j];b[j]=t;}return b;}

// Nav
var screens=['fc','sp','wl','st'];
function show(id){
  screens.forEach(function(s){
    e('sc-'+s).className='sc'+(s===id?' on':'');
  });
  var btns=document.querySelectorAll('.nb');
  var idx2=screens.indexOf(id);
  btns.forEach(function(b,i){b.className='nb'+(i===idx2?' on':'');}); 
  if(id==='st') renderSt();
  if(id==='wl') renderWL();
}

// Build category dropdowns
function buildDrops(){
  var o='<option value="-1">All Categories</option>';
  CATS.forEach(function(c,i){o+='<option value="'+i+'">'+esc(c)+'</option>';}); 
  e('fcat').innerHTML=o;
  e('scat').innerHTML=o;
  // Pills
  var ph=e('wpills');
  function makePill(lbl,val){
    var b=document.createElement('button');
    b.className='pill'+(val===-1?' on':'');
    b.textContent=lbl;
    b.onclick=function(){
      wcat=val;
      ph.querySelectorAll('.pill').forEach(function(p){p.className='pill';});
      b.className='pill on';
      renderWL();
    };
    ph.appendChild(b);
  }
  makePill('All',-1);
  CATS.forEach(function(c,i){makePill(c,i);});
}

// ── FLASHCARDS ──
function filtW(){
  var cat=parseInt(e('fcat').value), dif=parseInt(e('fdif').value);
  return W.filter(function(w){return(cat<0||w[0]===cat)&&(dif<0||w[1]===dif);});
}
function startFC(useMissed){
  var pool=useMissed?missed:filtW();
  if(!pool.length){alert('No words match this filter.');return;}
  deck=shuf(pool);idx=0;flipped=false;kn=0;rv=0;missed=[];
  e('fsum').style.display='none';
  e('card').style.display='';
  e('acts').style.display='';
  showCard();
}
function showCard(){
  if(idx>=deck.length){showSum();return;}
  var w=deck[idx];
  var dv=parseInt(e('fdir').value);
  var ef=(dv===0)||(dv===2&&Math.random()>0.5);
  var ft=ef?w[2]:w[3], bt=ef?w[3]:w[2];
  e('cftag').textContent=CATS[w[0]];
  e('cbtag').textContent=CATS[w[0]];
  e('cfdif').textContent='Level: '+(w[1]===0?'D1':'D2');
  e('cfen').textContent=ft;
  e('cfhnt').textContent='Tap to flip';
  e('cbta').textContent=bt;
  e('cbsub').textContent=ef?'( '+w[2]+' )':'';
  e('card').className='card';
  flipped=false;
  var pct=Math.round((idx/deck.length)*100);
  e('fpb').style.width=pct+'%';
  e('fstat').textContent=(idx+1)+' / '+deck.length;
}
function flipCard(){
  if(e('acts').style.display==='none')return;
  flipped=!flipped;
  e('card').className='card'+(flipped?' flip':'');
}
function nc(knew,skip){
  if(!skip){
    var k=deck[idx][0]+'|'+deck[idx][2];
    if(!prog[k])prog[k]={s:0,k:0};
    prog[k].s++;
    if(knew){kn++;prog[k].k++;}else{rv++;missed.push(deck[idx]);}
    ss('tp',prog);
  }
  idx++;showCard();
}
function showSum(){
  e('card').style.display='none';
  e('acts').style.display='none';
  e('fsum').style.display='block';
  e('sk').textContent=kn;e('sr').textContent=rv;e('st2').textContent=deck.length;
}

// ── SENTENCES ──
function filtS(){
  var cat=parseInt(e('scat').value),dif=parseInt(e('sdif').value);
  return S.filter(function(s){return(cat<0||s[0]===cat)&&(dif<0||s[1]===dif);});
}
function genS(){
  var pool=filtS();
  if(!pool.length){e('slist').innerHTML='<div class="ldg">No sentences match.</div>';return;}
  var set=shuf(pool).slice(0,8);
  var html='';
  set.forEach(function(s,i){
    var kw=s[2],en=esc(s[3]),ta=esc(s[4]),hint=esc(s[5]);
    var lo=en.toLowerCase(),klo=kw.toLowerCase(),ki=lo.indexOf(klo);
    var hen=en;
    if(ki>=0)hen=en.slice(0,ki)+'<span class="khl">'+en.slice(ki,ki+kw.length)+'</span>'+en.slice(ki+kw.length);
    html+='<div class="qc">'+
      '<div class="qm"><span class="tag tc">'+esc(CATS[s[0]])+'</span>'+
      '<span class="tag td">'+(s[1]===0?'D1':'D2')+'</span>'+
      '<span class="tag tk">'+esc(kw)+'</span></div>'+
      '<div class="qen"><b>Q'+(i+1)+'.</b> '+hen+'</div>'+
      '<div class="atog" onclick="rev(this)" data-ta="'+ta+'" data-h="'+hint+'">'+
        '<div class="al">Tap to see Tamil answer</div>'+
        '<div class="rh">தமிழ் விடையை காண்க</div>'+
      '</div></div>';
  });
  e('slist').innerHTML=html;
}
function rev(el){
  if(el.className.indexOf('rev')>=0)return;
  el.className='atog rev';
  el.innerHTML='<div class="al" style="color:#4ade80">Answer</div>'+
    '<div class="ata">'+el.dataset.ta+'</div>'+
    '<div class="ah">'+el.dataset.h+'</div>';
}

// ── WORD LIST ──
function renderWL(){
  var q=(e('wsrch').value||'').toLowerCase().trim();
  var tb=e('wtb');tb.innerHTML='';
  var n=0;
  W.forEach(function(w){
    if(wcat>=0&&w[0]!==wcat)return;
    if(q&&w[2].toLowerCase().indexOf(q)<0&&w[3].indexOf(q)<0&&CATS[w[0]].toLowerCase().indexOf(q)<0)return;
    n++;
    var tr=document.createElement('tr');
    tr.innerHTML='<td>'+n+'</td><td>'+esc(CATS[w[0]])+'</td><td>'+esc(w[2])+'</td>'+
      '<td class="ta">'+esc(w[3])+'</td><td><span class="'+(w[1]===0?'d1':'d2')+'">'+(w[1]===0?'D1':'D2')+'</span></td>';
    tb.appendChild(tr);
  });
}

// ── STATS ──
function renderSt(){
  var keys=Object.keys(prog);
  var seen=keys.length,known=0,master=0;
  keys.forEach(function(k){if(prog[k].k>0)known++;if(prog[k].k>=2)master++;});
  e('stg').innerHTML=
    '<div class="sc2"><div class="sn2">'+W.length+'</div><div class="sl2">Total Words</div></div>'+
    '<div class="sc2"><div class="sn2">'+seen+'</div><div class="sl2">Practiced</div></div>'+
    '<div class="sc2"><div class="sn2" style="color:#4ade80">'+known+'</div><div class="sl2">Known</div></div>'+
    '<div class="sc2"><div class="sn2" style="color:#a78bfa">'+master+'</div><div class="sl2">Mastered</div></div>';
  var ch=e('stc');ch.innerHTML='';
  CATS.forEach(function(cat,ci){
    var tot=0,kn2=0;
    W.forEach(function(w){
      if(w[0]===ci){tot++;var pk=prog[ci+'|'+w[2]];if(pk&&pk.k>0)kn2++;}
    });
    var pct=tot?Math.round((kn2/tot)*100):0;
    var d=document.createElement('div');d.className='pbr';
    d.innerHTML='<div class="pbt"><span>'+esc(cat)+'</span><span style="color:#a0a0c0">'+kn2+'/'+tot+'</span></div>'+
      '<div class="pbb"><div class="pbf" style="width:'+pct+'%"></div></div>';
    ch.appendChild(d);
  });
}
function resetP(){
  if(!confirm('Reset all progress?'))return;
  prog={};sd('tp');renderSt();
}

// ── START ──
buildDrops();
startFC(false);
</script>
